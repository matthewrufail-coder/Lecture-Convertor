<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lecture to Textbook Converter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
      background: #f5f5f5; 
      color: #333; 
    }
    
    .container { 
      max-width: 900px; 
      margin: 0 auto; 
      padding: 2rem; 
    }
    
    .header { 
      text-align: center; 
      margin-bottom: 2rem; 
    }
    
    .header h1 { 
      font-size: 28px; 
      margin-bottom: 0.5rem; 
    }
    
    .header p { 
      color: #666; 
      font-size: 14px; 
    }
    
    .form-group { 
      margin-bottom: 1.5rem; 
    }
    
    .form-group label { 
      display: block; 
      font-weight: 500; 
      margin-bottom: 8px; 
    }
    
    textarea { 
      width: 100%; 
      min-height: 200px; 
      padding: 12px; 
      border: 1px solid #ddd; 
      border-radius: 6px;
      font-family: monospace;
      font-size: 13px;
      resize: vertical;
    }
    
    .button-group { 
      display: flex; 
      gap: 12px; 
      margin: 2rem 0; 
    }
    
    button { 
      padding: 12px 24px; 
      border: 1px solid #ddd; 
      background: white;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    button:hover { 
      background: #f9f9f9; 
    }
    
    button.primary { 
      background: #000; 
      color: white; 
      border-color: #000;
    }
    
    button.primary:hover { 
      background: #333; 
    }
    
    button:disabled { 
      opacity: 0.5; 
      cursor: not-allowed; 
    }
    
    .status { 
      padding: 12px; 
      border-radius: 6px; 
      margin: 1rem 0;
      font-size: 13px;
      display: none;
    }
    
    .status.show { 
      display: block; 
    }
    
    .status.loading { 
      background: #e3f2fd; 
      color: #1565c0; 
    }
    
    .status.success { 
      background: #e8f5e9; 
      color: #2e7d32; 
    }
    
    .status.error { 
      background: #ffebee; 
      color: #c62828; 
    }
    
    .output-panel {
      background: white;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 2rem;
      line-height: 1.8;
      margin: 2rem 0;
      display: none;
    }
    
    .output-panel.show { 
      display: block; 
    }
    
    .output-panel h2 { 
      font-size: 20px; 
      margin: 1.5rem 0 1rem; 
    }
    
    .output-panel h3 { 
      font-size: 16px; 
      margin: 1.2rem 0 0.8rem; 
    }
    
    .output-panel p { 
      margin-bottom: 1rem; 
    }
    
    .output-panel img { 
      max-width: 100%; 
      height: auto; 
      margin: 1rem 0; 
      border-radius: 6px; 
    }
    
    .loading-spinner { 
      display: inline-block; 
      width: 16px; 
      height: 16px; 
      border: 2px solid #1565c0; 
      border-top: 2px solid transparent; 
      border-radius: 50%; 
      animation: spin 0.8s linear infinite; 
    }
    
    @keyframes spin { 
      to { transform: rotate(360deg); } 
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Lecture to Textbook Converter</h1>
      <p>Transform your lectures into Pathoma-style college textbook content</p>
    </div>

    <div class="form-group">
      <label>Lecture Notes or Transcript</label>
      <textarea id="lectureInput" placeholder="Paste your lecture notes, transcript, or outline here..."></textarea>
    </div>

    <div class="button-group">
      <button class="primary" id="convertBtn">Convert to Textbook Style</button>
      <button id="clearBtn">Clear</button>
    </div>

    <div id="status" class="status"></div>

    <div id="outputPanel" class="output-panel"></div>

    <div id="downloadContainer" style="display: none; margin-top: 1rem;">
      <button id="downloadBtn" class="primary">Download as HTML</button>
      <button id="copyBtn">Copy to Clipboard</button>
    </div>
  </div>

  <script>
    const lectureInput = document.getElementById('lectureInput');
    const convertBtn = document.getElementById('convertBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusDiv = document.getElementById('status');
    const outputPanel = document.getElementById('outputPanel');
    const downloadContainer = document.getElementById('downloadContainer');
    const downloadBtn = document.getElementById('downloadBtn');
    const copyBtn = document.getElementById('copyBtn');

    convertBtn.addEventListener('click', async () => {
      const lecture = lectureInput.value.trim();
      if (!lecture) {
        showStatus('Please enter lecture content', 'error');
        return;
      }

      showStatus('<span class="loading-spinner"></span> Converting to textbook style...', 'loading');
      convertBtn.disabled = true;

      try {
        const response = await fetch('/api/convert', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ lecture })
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || 'Conversion failed');
        }

        const data = await response.json();
        displayOutput(data.text);
        showStatus('✓ Conversion complete!', 'success');
      } catch (err) {
        showStatus(`Error: ${err.message}`, 'error');
      } finally {
        convertBtn.disabled = false;
      }
    });

    clearBtn.addEventListener('click', () => {
      lectureInput.value = '';
      outputPanel.classList.remove('show');
      downloadContainer.style.display = 'none';
      statusDiv.classList.remove('show');
    });

    function displayOutput(markdownText) {
      let html = markdownText
        .replace(/^### (.*?)$/gm, '<h3>$1</h3>')
        .replace(/^## (.*?)$/gm, '<h2>$1</h2>')
        .replace(/^# (.*?)$/gm, '<h2>$1</h2>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/\n\n+/g, '</p><p>')
        .replace(/^- (.*?)$/gm, '<li>$1</li>')
        .replace(/(<li>.*?<\/li>)/s, '<ul>$1</ul>')
        .replace(/<p><\/p>/g, '');

      outputPanel.innerHTML = html;
      outputPanel.classList.add('show');
      downloadContainer.style.display = 'block';
    }

    function showStatus(message, type) {
      statusDiv.innerHTML = message;
      statusDiv.className = `status show ${type}`;
    }

    downloadBtn.addEventListener('click', () => {
      const html = `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Textbook Chapter</title>
  <style>
    body { font-family: Georgia, serif; line-height: 1.8; max-width: 800px; margin: 0 auto; padding: 2rem; }
    h1, h2, h3 { font-family: Arial, sans-serif; margin-top: 1.5rem; }
  </style>
</head>
<body>
${outputPanel.innerHTML}
</body>
</html>`;

      const blob = new Blob([html], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'textbook-chapter.html';
      a.click();
      URL.revokeObjectURL(url);
    });

    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(outputPanel.innerText).then(() => {
        showStatus('✓ Copied to clipboard!', 'success');
      });
    });
  </script>
</body>
</html>
