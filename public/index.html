<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Medical Lecture Formatter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
      color: white;
      padding: 3rem 2rem;
      text-align: center;
    }

    .header h1 {
      font-size: 32px;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .header p {
      font-size: 16px;
      opacity: 0.9;
    }

    .content {
      padding: 2rem;
    }

    .section {
      margin-bottom: 2rem;
      padding: 1.5rem;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      background: #fafafa;
    }

    .section h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #2c3e50;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .upload-zone {
      border: 2px dashed #667eea;
      border-radius: 8px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: white;
    }

    .upload-zone:hover {
      border-color: #764ba2;
      background: #f9f9f9;
    }

    .upload-zone.dragover {
      border-color: #764ba2;
      background: #f3f0ff;
      box-shadow: 0 4px 12px rgba(118, 75, 162, 0.2);
    }

    .upload-zone input {
      display: none;
    }

    .upload-zone p {
      margin: 0.5rem 0;
      font-size: 14px;
      color: #666;
    }

    .upload-zone .main {
      font-size: 16px;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 0.5rem;
    }

    textarea {
      width: 100%;
      min-height: 200px;
      padding: 1rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 13px;
      resize: vertical;
      line-height: 1.5;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .file-list {
      margin-top: 1rem;
    }

    .file-item {
      background: white;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      margin-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 3px solid #667eea;
      font-size: 13px;
    }

    .file-item button {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 18px;
    }

    .file-item button:hover {
      color: #e74c3c;
    }

    .buttons {
      display: flex;
      gap: 1rem;
      margin: 2rem 0;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    button.convert {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      flex: 1;
    }

    button.convert:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    button.convert:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    button.clear {
      background: #f0f0f0;
      color: #333;
      border: 1px solid #ddd;
    }

    button.clear:hover {
      background: #e8e8e8;
    }

    .status {
      padding: 1rem;
      border-radius: 6px;
      margin: 1rem 0;
      font-size: 13px;
      display: none;
      align-items: center;
      gap: 0.75rem;
    }

    .status.show {
      display: flex;
    }

    .status.loading {
      background: #e3f2fd;
      color: #1565c0;
      border-left: 3px solid #1565c0;
    }

    .status.success {
      background: #e8f5e9;
      color: #2e7d32;
      border-left: 3px solid #2e7d32;
    }

    .status.error {
      background: #ffebee;
      color: #c62828;
      border-left: 3px solid #c62828;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid currentColor;
      border-top: 2px solid transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .output-section {
      display: none;
      margin-top: 2rem;
    }

    .output-section.show {
      display: block;
    }

    .output-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 1.5rem 2rem;
      border-radius: 8px 8px 0 0;
      font-size: 18px;
      font-weight: 600;
    }

    .output-content {
      background: white;
      border: 1px solid #e0e0e0;
      border-top: none;
      padding: 2rem;
      line-height: 1.8;
      font-size: 15px;
      max-height: 700px;
      overflow-y: auto;
    }

    .output-content h1 {
      font-size: 28px;
      margin: 1.5rem 0 1rem;
      color: #2c3e50;
      border-bottom: 2px solid #667eea;
      padding-bottom: 0.5rem;
    }

    .output-content h2 {
      font-size: 22px;
      margin: 1.5rem 0 0.8rem;
      color: #667eea;
      font-weight: 600;
    }

    .output-content h3 {
      font-size: 16px;
      margin: 1rem 0 0.5rem;
      color: #764ba2;
      font-weight: 600;
    }

    .output-content p {
      margin-bottom: 1rem;
      color: #333;
    }

    .output-content strong {
      color: #764ba2;
      font-weight: 600;
    }

    .output-content em {
      color: #667eea;
      font-style: italic;
    }

    .output-content ul, .output-content ol {
      margin: 1rem 0 1rem 2rem;
    }

    .output-content li {
      margin-bottom: 0.5rem;
    }

    .output-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      border: 1px solid #ddd;
    }

    .output-content th {
      background: #667eea;
      color: white;
      padding: 0.75rem;
      text-align: left;
      font-weight: 600;
    }

    .output-content td {
      padding: 0.75rem;
      border: 1px solid #ddd;
    }

    .output-content tr:nth-child(even) {
      background: #f9f9f9;
    }

    .output-content img {
      max-width: 100%;
      height: auto;
      margin: 1.5rem 0;
      border-radius: 6px;
      border: 1px solid #ddd;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .download-buttons {
      display: none;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .download-buttons.show {
      display: flex;
    }

    button.download {
      flex: 1;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    button.download:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    button.copy {
      flex: 1;
      background: #f0f0f0;
      color: #333;
      border: 1px solid #ddd;
    }

    button.copy:hover {
      background: #e8e8e8;
    }

    @media (max-width: 600px) {
      .header h1 {
        font-size: 24px;
      }

      .buttons {
        flex-direction: column;
      }

      .download-buttons {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📚 Medical Lecture Formatter</h1>
      <p>Transform lecture materials into organized study documents</p>
    </div>

    <div class="content">
      <!-- PDF Upload -->
      <div class="section">
        <h3>📄 Upload PDF or Document</h3>
        <div class="upload-zone" id="uploadZone">
          <div class="main">Click to upload or drag PDF here</div>
          <p style="font-size: 12px; color: #999;">PDF, DOCX, or TXT files</p>
          <input type="file" id="fileInput" accept=".pdf,.docx,.doc,.txt">
        </div>
        <div class="file-list" id="fileList"></div>
      </div>

      <!-- Text Paste -->
      <div class="section">
        <h3>✏️ Or Paste Lecture Notes</h3>
        <textarea id="textInput" placeholder="Paste your lecture notes, slides, or transcript here..."></textarea>
      </div>

      <!-- Buttons -->
      <div class="buttons">
        <button class="convert" id="convertBtn">🚀 Convert & Format</button>
        <button class="clear" id="clearBtn">🗑️ Clear</button>
      </div>

      <!-- Status -->
      <div class="status" id="status"></div>

      <!-- Output -->
      <div class="output-section" id="outputSection">
        <div class="output-header">✨ Formatted Study Document</div>
        <div class="output-content" id="outputContent"></div>
        <div class="download-buttons" id="downloadButtons">
          <button class="download" id="downloadBtn">⬇️ Download HTML</button>
          <button class="copy" id="copyBtn">📋 Copy to Clipboard</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const textInput = document.getElementById('textInput');
    const convertBtn = document.getElementById('convertBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusDiv = document.getElementById('status');
    const outputSection = document.getElementById('outputSection');
    const outputContent = document.getElementById('outputContent');
    const downloadButtons = document.getElementById('downloadButtons');
    const downloadBtn = document.getElementById('downloadBtn');
    const copyBtn = document.getElementById('copyBtn');

    let uploadedFile = null;

    // File upload handlers
    uploadZone.addEventListener('click', () => fileInput.click());

    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });

    uploadZone.addEventListener('dragleave', () => {
      uploadZone.classList.remove('dragover');
    });

    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) handleFile(e.target.files[0]);
    });

    function handleFile(file) {
      uploadedFile = file;
      updateFileList();
    }

    function updateFileList() {
      if (uploadedFile) {
        fileList.innerHTML = `
          <div class="file-item">
            <span>📎 ${uploadedFile.name}</span>
            <button onclick="removeFile()">×</button>
          </div>
        `;
      } else {
        fileList.innerHTML = '';
      }
    }

    window.removeFile = () => {
      uploadedFile = null;
      fileInput.value = '';
      updateFileList();
    };

    clearBtn.addEventListener('click', () => {
      textInput.value = '';
      uploadedFile = null;
      fileInput.value = '';
      updateFileList();
      outputSection.classList.remove('show');
      downloadButtons.classList.remove('show');
      statusDiv.classList.remove('show');
    });

    convertBtn.addEventListener('click', async () => {
      const text = textInput.value.trim();
      const hasFile = uploadedFile !== null;
      const hasText = text.length > 0;

      if (!hasFile && !hasText) {
        showStatus('❌ Please upload a file or paste content', 'error');
        return;
      }

      showStatus('<span class="spinner"></span> Processing lecture material... This may take 30-60 seconds', 'loading');
      convertBtn.disabled = true;

      try {
        const formData = new FormData();
        
        if (hasFile) {
          formData.append('file', uploadedFile);
        }
        
        if (hasText) {
          formData.append('lectureText', text);
        }

        const response = await fetch('/api/convert', {
          method: 'POST',
          body: formData,
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Conversion failed');
        }

        displayOutput(data.content);
        showStatus('✅ Lecture formatted successfully!', 'success');
      } catch (error) {
        showStatus(`❌ Error: ${error.message}`, 'error');
      } finally {
        convertBtn.disabled = false;
      }
    });

    function displayOutput(markdown) {
      let html = markdown
        .replace(/^### (.*?)$/gm, '<h3>$1</h3>')
        .replace(/^## (.*?)$/gm, '<h2>$1</h2>')
        .replace(/^# (.*?)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/\n\n+/g, '</p><p>')
        .replace(/^- (.*?)$/gm, '<li>$1</li>')
        .replace(/(<li>.*?<\/li>)/s, '<ul>$1</ul>')
        .replace(/\| (.*?) \|\n\| [-:|]+\n/g, (match) => {
          const rows = match.split('\n').filter(r => r.trim());
          return '<table><tr>' + rows[0].split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('') + '</tr>';
        })
        .replace(/^((?:(?!^|<\/table>).)*?\| .*)/gms, (match) => {
          const lines = match.trim().split('\n');
          let tableHtml = '';
          let inTable = false;
          
          lines.forEach((line, idx) => {
            if (line.includes('|')) {
              if (!inTable) {
                tableHtml = '<table><tr>';
                inTable = true;
              } else if (idx > 0 && !lines[idx-1].includes('|')) {
                tableHtml = '<table><tr>';
              }
              
              if (line.includes('---') || line.includes('-|')) {
                return; // Skip separator lines
              }
              
              const cells = line.split('|').map(c => c.trim()).filter(c => c);
              if (cells.length > 0) {
                tableHtml += '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
              }
            }
          });
          
          if (inTable) {
            tableHtml += '</table>';
          }
          return tableHtml || match;
        })
        .replace(/<p><\/p>/g, '');

      outputContent.innerHTML = html;
      outputSection.classList.add('show');
      downloadButtons.classList.add('show');

      setTimeout(() => outputSection.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
    }

    function showStatus(message, type) {
      statusDiv.innerHTML = message;
      statusDiv.className = `status show ${type}`;
    }

    downloadBtn.addEventListener('click', () => {
      const html = `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Medical Study Document</title>
  <style>
    body {
      font-family: Georgia, 'Times New Roman', serif;
      line-height: 1.8;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
      color: #333;
      background: #f9f9f9;
    }
    h1, h2, h3 { font-family: Arial, sans-serif; margin-top: 1.5rem; margin-bottom: 0.5rem; }
    h1 { font-size: 32px; border-bottom: 2px solid #667eea; padding-bottom: 0.5rem; }
    h2 { font-size: 24px; color: #667eea; }
    h3 { font-size: 18px; color: #764ba2; }
    p { margin-bottom: 1rem; }
    strong { color: #764ba2; font-weight: 600; }
    em { color: #667eea; font-style: italic; }
    ul, ol { margin: 1rem 0 1rem 2rem; }
    li { margin-bottom: 0.5rem; }
    table { width: 100%; border-collapse: collapse; margin: 1rem 0; border: 1px solid #ddd; }
    th { background: #667eea; color: white; padding: 0.75rem; text-align: left; }
    td { padding: 0.75rem; border: 1px solid #ddd; }
    tr:nth-child(even) { background: #f9f9f9; }
    img { max-width: 100%; height: auto; margin: 1.5rem 0; border-radius: 6px; border: 1px solid #ddd; }
  </style>
</head>
<body>
${outputContent.innerHTML}
</body>
</html>`;

      const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `lecture-${new Date().getTime()}.html`;
      link.click();
      URL.revokeObjectURL(link.href);
    });

    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(outputContent.innerText).then(() => {
        showStatus('✅ Content copied!', 'success');
        setTimeout(() => statusDiv.classList.remove('show'), 2000);
      });
    });
  </script>
</body>
</html>
